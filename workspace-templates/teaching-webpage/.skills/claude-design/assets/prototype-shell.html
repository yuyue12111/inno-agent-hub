<!doctype html>
<!--
  React + Babel prototype shell with pinned versions and integrity hashes.
  Do not change the script versions or integrity attributes — they silently break things.

  Usage:
  1. Write your components in components.jsx; export via Object.assign(window, {...}).
  2. Write your app in app.jsx; read from window at the top.
  3. Put real styles in styles.css or use Tailwind (uncomment the CDN line below).
  4. Load the prototype in a browser to verify — never ship without a real-browser check.

  Anti-patterns (see references/react-babel.md for the why):
  - No `const styles = {...}` at file top-level; name them uniquely.
  - No `type="module"` on Babel scripts.
  - No `scrollIntoView` in components.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Prototype</title>
  <link rel="stylesheet" href="styles.css">

  <!-- Pinned React 18.3.1 + ReactDOM 18.3.1 + Babel-standalone 7.29.0 -->
  <script
    src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"
  ></script>

  <!-- Optional: Tailwind via CDN (uncomment if desired) -->
  <!--
  <script>
    tailwind = tailwind || {};
    tailwind.config = {
      theme: { extend: {
        colors: { brand: { 500: '#D97757', 600: '#B85C3E' } },
        fontFamily: { display: ['Söhne', 'sans-serif'] },
      }},
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  -->
</head>
<body>
  <div id="root"></div>

  <!-- Order matters: shared components first, then app -->
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
