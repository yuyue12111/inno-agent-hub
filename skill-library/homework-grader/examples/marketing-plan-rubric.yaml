# 市场营销基础 — 营销方案策划评分标准
# Marketing Fundamentals — Marketing Plan Rubric
#
# Modality: Mixed (docx/pdf + images)
# Students: ~150
# Language: zh-CN

rubric:
  id: marketing-plan-v1.0
  name: "营销方案策划评分标准"
  version: 1.0
  created: "2026-02-22"
  updated: "2026-02-22"
  author: "课程组"

  course:
    name: "市场营销基础"
    assignment: "营销方案策划"
    submission_type: mixed
    expected_formats: ["docx", "pdf", "jpg", "png"]
    student_count: 150

  gates:
    - id: G-001
      name: "方案结构门禁"
      description: "必须包含目标、策略、执行、评估四个核心章节"
      check_method: structure
      parameters:
        required_sections: ["目标", "策略", "执行", "评估"]
      on_fail: warn

  criteria:
    strategy_logic:
      name: "策略逻辑"
      weight: 0.30
      scale: [1, 2, 3, 4, 5]
      description: "营销策略的逻辑完整性和可行性"
      scoring_guidance: "关注目标→策略→执行→评估的闭环完整性，策略选择是否有理据支撑"
      anchors:
        5: "目标→策略→执行→评估的完整闭环；策略选择有理据；执行步骤可操作"
        4: "策略链条基本完整；选择有依据；执行步骤较清晰"
        3: "策略方向正确但链条有断裂；部分环节缺乏论证"
        2: "策略零散无体系；缺乏目标导向"
        1: "无策略可言，内容拼凑"
      evidence_type: quote

    target_clarity:
      name: "目标明确性"
      weight: 0.25
      scale: [1, 2, 3, 4, 5]
      description: "营销目标是否清晰、可量化、可评估"
      scoring_guidance: "关注是否使用SMART原则，是否有阶段性目标和可量化KPI"
      anchors:
        5: "SMART 目标明确；有阶段性里程碑；KPI 可量化"
        4: "目标清晰可评估；有部分量化指标"
        3: "目标可理解但不够具体；缺少量化指标"
        2: "目标模糊；无法评估达成与否"
        1: "无明确目标"
      evidence_type: quote

    execution_detail:
      name: "执行细节"
      weight: 0.25
      scale: [1, 2, 3, 4, 5]
      description: "方案在内容规划、渠道选择、时间排期方面的完善度"
      scoring_guidance: "关注内容日历、渠道分析深度、时间排期合理性和预算分配"
      anchors:
        5: "内容日历完善；渠道选择有分析支撑；时间排期合理；预算分配清晰"
        4: "有内容规划和渠道分析；时间安排合理"
        3: "有基本规划但缺乏细节；渠道分析不够深入"
        2: "规划草率；缺少关键环节"
        1: "无执行规划"
      evidence_type: observation

    visual_presentation:
      name: "视觉呈现"
      weight: 0.20
      scale: [1, 2, 3, 4, 5]
      description: "方案中的视觉设计稿、样图、排版的质量"
      scoring_guidance: "关注视觉稿的专业度、与品牌/主题的一致性、排版规范性"
      anchors:
        5: "视觉稿专业美观；与品牌/主题高度一致；排版规范"
        4: "视觉稿质量良好；与主题基本一致"
        3: "有视觉稿但质量一般；或与主题关联度不足"
        2: "视觉稿粗糙或不相关"
        1: "无视觉呈现"
      evidence_type: observation

  thresholds:
    accept: 3.0
    reject: 1.5
    review: [1.5, 3.0]

  comment_guidelines:
    tone: "建设性、鼓励性、具体"
    language: "zh-CN"
    length_range: [200, 400]
    required_sections: ["strengths", "weaknesses", "suggestions"]
    prohibited_patterns:
      - "笼统表扬（如'方案不错'而不说明哪里好）"
      - "无具体指向的批评（如'需要完善'而不说明完善什么）"
      - "仅评价视觉而忽略策略逻辑"

  history:
    - version: 1.0
      date: "2026-02-22"
      changes:
        - "初始版本"
      reason: "首次部署"
