# 研究方法论 — 案例分析报告评分标准
# Research Methods — Case Analysis Report Rubric
#
# Modality: Text (docx/pdf)
# Students: ~80
# Language: zh-CN

rubric:
  id: research-methods-case-analysis-v1.0
  name: "研究方法论案例分析报告评分标准"
  version: 1.0
  created: "2026-02-22"
  updated: "2026-02-22"
  author: "课程组"

  course:
    name: "研究方法论"
    assignment: "案例分析报告"
    submission_type: text
    expected_formats: ["docx", "pdf"]
    student_count: 80

  gates:
    - id: G-001
      name: "参考文献门禁"
      description: "必须包含参考文献列表"
      check_method: keyword
      parameters:
        keywords: ["参考文献", "References", "引用"]
        min_count: 1
      on_fail: flag

    - id: G-002
      name: "字数门禁"
      description: "正文字数在合理范围内"
      check_method: length
      parameters:
        min_words: 1500
        max_words: 8000
      on_fail: warn

  criteria:
    analysis_depth:
      name: "分析深度"
      weight: 0.30
      scale: [1, 2, 3, 4, 5]
      description: "对案例的深入程度，是否超越现象层面挖掘根因"
      scoring_guidance: "关注是否有多层次分析（现象→原因→影响→启示），是否运用课程理论框架"
      anchors:
        5: "多层次分析清晰完整；正确运用2种以上理论框架；数据支撑充分；有原创性洞察"
        4: "分析有层次感；运用1-2种理论框架；有数据支持；有一定独到见解"
        3: "分析覆盖主要方面但缺乏深度；理论运用表面化；数据引用有限"
        2: "分析停留在现象描述层面；未运用理论框架；缺少数据支撑"
        1: "内容为简单搬运或摘抄，无分析可言"
      evidence_type: quote

    data_application:
      name: "数据运用"
      weight: 0.25
      scale: [1, 2, 3, 4, 5]
      description: "是否有效使用数据支撑论点"
      scoring_guidance: "关注数据的相关性、时效性、来源可靠性和解读准确性"
      anchors:
        5: "引用3处以上可靠数据源；数据时效性好（近3年）；数据与论点紧密关联；解读准确"
        4: "引用2-3处数据；来源基本可靠；与论点相关；解读基本准确"
        3: "引用1-2处数据但来源不明确；数据与论点关联度一般"
        2: "数据引用极少且来源不可靠或过时"
        1: "无数据引用，或数据完全不相关"
      evidence_type: quote

    strategy_feasibility:
      name: "策略可行性"
      weight: 0.25
      scale: [1, 2, 3, 4, 5]
      description: "提出的策略建议是否可落地执行"
      scoring_guidance: "关注策略的具体性、资源可行性、预期效果和风险考量"
      anchors:
        5: "策略具体可操作；考虑资源和时间约束；有预期效果量化；识别风险并有预案"
        4: "策略较具体；考虑了主要约束条件；有效果预期"
        3: "策略方向正确但较笼统；未充分考虑约束条件"
        2: "策略过于理想化或笼统，缺乏可操作性"
        1: "未提出策略，或策略与案例无关"
      evidence_type: observation

    writing_quality:
      name: "写作规范"
      weight: 0.20
      scale: [1, 2, 3, 4, 5]
      description: "报告的结构、语言和格式规范性"
      scoring_guidance: "关注逻辑结构、段落组织、用语准确性和引用格式"
      anchors:
        5: "结构清晰完整；逻辑连贯；语言准确专业；引用格式规范"
        4: "结构合理；逻辑基本清晰；语言通顺；引用格式基本规范"
        3: "结构基本完整但逻辑链有断裂；存在若干语病；引用格式不统一"
        2: "结构混乱或缺失关键部分；逻辑跳跃大；语言问题较多"
        1: "无明显结构；语言不通顺；无引用"
      evidence_type: observation

  thresholds:
    accept: 3.0
    reject: 1.5
    review: [1.5, 3.0]

  comment_guidelines:
    tone: "建设性、鼓励性、具体"
    language: "zh-CN"
    length_range: [200, 400]
    required_sections: ["strengths", "weaknesses", "suggestions"]
    prohibited_patterns:
      - "笼统表扬（如'写得不错'而不说明哪里好）"
      - "无具体指向的批评（如'需要加强'而不说明加强什么）"

  history:
    - version: 1.0
      date: "2026-02-22"
      changes:
        - "初始版本"
      reason: "首次部署"
