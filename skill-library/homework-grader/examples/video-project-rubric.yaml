# 数字媒体制作 — 视频作品评分标准
# Digital Media Production — Video Submission Rubric
#
# Modality: Mixed (mp4 + docx)
# Students: ~500
# Language: zh-CN

rubric:
  id: media-production-video-v1.0
  name: "视频作品评分标准"
  version: 1.0
  created: "2026-02-22"
  updated: "2026-02-22"
  author: "课程组"

  course:
    name: "数字媒体制作"
    assignment: "视频作品提交"
    submission_type: mixed
    expected_formats: ["mp4", "docx"]
    student_count: 500

  gates:
    - id: G-001
      name: "双文件门禁"
      description: "必须同时提交视频文件和创作报告"
      check_method: structure
      parameters:
        required_files: ["*.mp4", "*.docx"]
      on_fail: flag

  criteria:
    content_creativity:
      name: "内容创意"
      weight: 0.25
      scale: [1, 2, 3, 4, 5]
      description: "视频的主题选择、创意表达和内容质量"
      scoring_guidance: "关注选题新颖性、叙事结构、信息密度和观点表达"
      anchors:
        5: "选题新颖有洞察；叙事引人入胜；信息密度高；有明确且独特的观点"
        4: "选题有一定新意；叙事完整流畅；内容充实"
        3: "选题中规中矩；叙事基本完整；内容覆盖要点但无亮点"
        2: "选题陈旧或跟风；叙事断裂；内容单薄"
        1: "无明确主题；内容混乱或空洞"
      evidence_type: observation

    production_quality:
      name: "制作质量"
      weight: 0.25
      scale: [1, 2, 3, 4, 5]
      description: "视频的拍摄、剪辑、配乐和整体视觉呈现"
      scoring_guidance: "关注画面稳定性、构图、剪辑节奏、音画同步、字幕和特效使用"
      anchors:
        5: "画面精良；剪辑节奏感强；配乐贴合内容；字幕规范美观；整体完成度高"
        4: "画面清晰稳定；剪辑流畅；有配乐和字幕"
        3: "画面基本清晰；剪辑有改进空间；配乐/字幕有但较粗糙"
        2: "画面不稳定或模糊；剪辑生硬；缺少配乐或字幕"
        1: "原始素材未经剪辑，或画质/音质极差"
      evidence_type: observation

    operation_strategy:
      name: "传播策略"
      weight: 0.25
      scale: [1, 2, 3, 4, 5]
      description: "创作报告中的平台选择、发布策略、推广计划"
      scoring_guidance: "关注目标受众定位、平台特性分析、发布时机选择、推广手段"
      anchors:
        5: "目标受众清晰；深入分析平台算法/特性；发布策略有依据；推广计划具体可行"
        4: "受众定位合理；了解平台基本规则；有发布和推广计划"
        3: "有受众描述但不够精准；平台分析表面化；计划较笼统"
        2: "受众定位模糊；对平台缺乏了解；无具体计划"
        1: "无传播思考，仅描述制作过程"
      evidence_type: quote

    data_analysis:
      name: "数据分析"
      weight: 0.25
      scale: [1, 2, 3, 4, 5]
      description: "对视频发布后数据的分析和反思"
      scoring_guidance: "关注数据指标选取、分析方法、归因合理性和迭代建议"
      anchors:
        5: "选取多维度数据指标；分析方法合理；归因逻辑清晰；提出有价值的迭代方向"
        4: "关注关键数据指标；分析有依据；有反思和改进方向"
        3: "罗列了部分数据但分析不深入；反思较表面"
        2: "仅贴截图未分析；或数据解读有明显错误"
        1: "无数据展示和分析"
      evidence_type: quote

  thresholds:
    accept: 3.0
    reject: 1.5
    review: [1.5, 3.0]

  comment_guidelines:
    tone: "建设性、鼓励性、具体"
    language: "zh-CN"
    length_range: [200, 400]
    required_sections: ["strengths", "weaknesses", "suggestions"]
    prohibited_patterns:
      - "仅评价视觉效果而忽略传播维度"
      - "笼统评价（如'视频不错'）"

  history:
    - version: 1.0
      date: "2026-02-22"
      changes:
        - "初始版本"
      reason: "首次部署"
